<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign a PDF - SIERA PDF</title>
<script src="/static/pdf.min.js"></script>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #1a1a2e; color: #e0e0e0; }
.header { background: #16213e; padding: 12px 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #0f3460; }
.header img { height: 28px; }
.header h1 { font-size: 16px; margin: 0; color: #fff; font-weight: 500; }
.header .nav { margin-left: auto; display: flex; gap: 16px; font-size: 13px; }
.header .nav a { color: #7ec8e3; text-decoration: none; }

/* Layout */
.app { display: flex; height: calc(100vh - 53px); }
.sidebar { width: 240px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; overflow-y: auto; }
.main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }

/* Sidebar */
.sidebar-section { padding: 16px; border-bottom: 1px solid #0f3460; }
.sidebar-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #7ec8e3; margin: 0 0 12px; }
.page-thumbs { display: flex; flex-direction: column; gap: 8px; padding: 12px; flex: 1; overflow-y: auto; }
.page-thumb { border: 2px solid #333; border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; transition: border-color 0.15s; }
.page-thumb:hover { border-color: #7ec8e3; }
.page-thumb.active { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.3); }
.page-thumb canvas { width: 100%; display: block; }
.page-thumb .label { position: absolute; bottom: 4px; right: 6px; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; }

/* Main viewer */
.viewer { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative; padding: 20px; }
.page-container { position: relative; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.page-container canvas { display: block; }

/* Signature overlay */
.sig-overlay { position: absolute; cursor: move; border: 2px dashed #2563eb; background: rgba(37,99,235,0.05); display: none; }
.sig-overlay img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
.sig-overlay .resize-handle { position: absolute; bottom: -4px; right: -4px; width: 12px; height: 12px; background: #2563eb; border-radius: 2px; cursor: nwse-resize; }
.sig-overlay .remove-btn { position: absolute; top: -10px; right: -10px; width: 20px; height: 20px; background: #ef4444; color: white; border: none; border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 20px; text-align: center; }

/* Upload state */
.upload-state { text-align: center; padding: 60px 40px; }
.upload-state .drop { border: 2px dashed #444; border-radius: 12px; padding: 60px 40px; cursor: pointer; transition: all 0.15s; }
.upload-state .drop:hover { border-color: #2563eb; background: rgba(37,99,235,0.05); }
.upload-state .drop p { margin: 0; }
.upload-state .drop .big { font-size: 18px; color: #ccc; }
.upload-state .drop .small { font-size: 13px; color: #666; margin-top: 8px; }
.upload-state input { display: none; }

/* Bottom toolbar */
.toolbar { background: #16213e; border-top: 1px solid #0f3460; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
.toolbar .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
.toolbar .btn-primary { background: #2563eb; color: white; }
.toolbar .btn-primary:hover { background: #1d4ed8; }
.toolbar .btn-primary:disabled { background: #444; color: #888; cursor: not-allowed; }
.toolbar .btn-secondary { background: #333; color: #ccc; }
.toolbar .btn-secondary:hover { background: #444; }
.toolbar .info { font-size: 12px; color: #888; margin-left: auto; }
.toolbar label { font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 6px; }
.toolbar input[type=checkbox] { accent-color: #2563eb; }

/* No signature warning */
.no-sig { background: #fef3cd; color: #856404; padding: 12px 20px; font-size: 13px; text-align: center; }
.no-sig a { color: #533f03; font-weight: 600; }

/* Loading */
.loading { color: #888; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <img src="/logo.png" alt="">
  <h1>Sign a PDF</h1>
  <div class="nav">
    <a href="/">Home</a>
    <a href="/signature">My Signature</a>
  </div>
</div>

<div id="noSigBanner" class="no-sig" style="display:none">
  No signature found. <a href="/signature">Create your signature first</a>
</div>

<div class="app">
  <!-- Sidebar: page thumbnails -->
  <div class="sidebar" id="sidebar" style="display:none">
    <div class="sidebar-section">
      <h3>Pages</h3>
    </div>
    <div class="page-thumbs" id="pageThumbs"></div>
  </div>

  <!-- Main area -->
  <div class="main">
    <!-- Upload state -->
    <div class="viewer" id="uploadView">
      <div class="upload-state">
        <div class="drop" onclick="document.getElementById('pdfInput').click()" id="pdfDrop">
          <p class="big">Click or drag a PDF here</p>
          <p class="small">Your signature will be placed on the page you choose</p>
          <input type="file" id="pdfInput" accept=".pdf" onchange="loadPdf(this.files[0])">
        </div>
      </div>
    </div>

    <!-- PDF viewer (hidden until PDF loaded) -->
    <div class="viewer" id="pdfView" style="display:none">
      <div class="page-container" id="pageContainer">
        <canvas id="pageCanvas"></canvas>
        <div class="sig-overlay" id="sigOverlay">
          <img id="sigImg" src="">
          <div class="resize-handle" id="resizeHandle"></div>
          <button class="remove-btn" onclick="removeSig()">&times;</button>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" style="display:none">
      <button class="btn btn-secondary" onclick="resetAll()">Change PDF</button>
      <button class="btn btn-secondary" id="placeSigBtn" onclick="placeSig()">Place Signature</button>
      <label><input type="checkbox" id="addDate" checked> Add date</label>
      <div class="info" id="posInfo"></div>
      <button class="btn btn-primary" id="signBtn" onclick="signAndDownload()" disabled>Sign &amp; Download</button>
    </div>
  </div>
</div>

<script>
var hasPdfJs = typeof pdfjsLib !== 'undefined';
if (hasPdfJs) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = '/static/pdf.worker.min.js';
}

var pdfDoc = null;
var currentPage = 1;
var totalPages = 0;
var pdfFile = null;
var pdfFileName = null;
var sigUrl = null;
var scale = 1.5;
var serverFile = null;

// Signature overlay state
var sigPlaced = false;
var sigX = 0, sigY = 0, sigW = 150, sigH = 60;
var dragging = false, resizing = false;
var dragOffX = 0, dragOffY = 0;

function showError(msg) {
  var el = document.querySelector('.upload-state .drop');
  if (el) el.innerHTML = '<p class="big" style="color:#ef4444">' + msg + '</p>';
}

// ── Check for existing signature ───────────────────────
fetch('/api/signature/current').then(function(r) { return r.json(); }).then(function(d) {
  if (d.url) {
    sigUrl = d.url;
    document.getElementById('sigImg').src = sigUrl;
  } else {
    document.getElementById('noSigBanner').style.display = 'block';
  }
});

// ── Auto-load PDF from server if ?file= param ──────────
var urlParams = new URLSearchParams(window.location.search);
var fileParam = urlParams.get('file');
if (fileParam) {
  serverFile = fileParam;
  pdfFileName = fileParam.indexOf('_') > -1 ? fileParam.substring(fileParam.indexOf('_') + 1) : fileParam;

  // Show loading state
  var dropEl = document.querySelector('.upload-state .drop');
  if (dropEl) dropEl.innerHTML = '<p class="big">Loading ' + pdfFileName + '...</p>';

  fetch('/files/' + encodeURIComponent(fileParam)).then(function(r) {
    if (!r.ok) throw new Error('File not found on server (HTTP ' + r.status + ')');
    return r.arrayBuffer();
  }).then(function(buf) {
    var data = new Uint8Array(buf);
    pdfFile = new File([data], pdfFileName, {type: 'application/pdf'});

    if (!hasPdfJs) {
      // pdf.js not available - still allow signing but without preview
      showError('PDF preview not available (pdf.js missing). You can still sign below.');
      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('signBtn').disabled = false;
      sigPlaced = true;
      return;
    }

    pdfjsLib.getDocument({data: data}).promise.then(function(pdf) {
      pdfDoc = pdf;
      totalPages = pdf.numPages;
      document.getElementById('uploadView').style.display = 'none';
      document.getElementById('pdfView').style.display = 'flex';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('toolbar').style.display = 'flex';
      renderThumbnails();
      renderPage(1);
    }).catch(function(e) {
      showError('Failed to render PDF: ' + e.message);
    });
  }).catch(function(e) {
    showError('Could not load file: ' + e.message);
  });
}

// ── PDF drop zone ──────────────────────────────────────
var pdfDrop = document.getElementById('pdfDrop');
pdfDrop.addEventListener('dragover', function(e) { e.preventDefault(); pdfDrop.style.borderColor = '#2563eb'; });
pdfDrop.addEventListener('dragleave', function() { pdfDrop.style.borderColor = '#444'; });
pdfDrop.addEventListener('drop', function(e) { e.preventDefault(); if (e.dataTransfer.files.length) loadPdf(e.dataTransfer.files[0]); });

// ── Load PDF ───────────────────────────────────────────
function loadPdf(file) {
  if (!file) return;
  pdfFile = file;
  var reader = new FileReader();
  reader.onload = function() {
    var data = new Uint8Array(reader.result);
    pdfjsLib.getDocument({data: data}).promise.then(function(pdf) {
      pdfDoc = pdf;
      totalPages = pdf.numPages;
      document.getElementById('uploadView').style.display = 'none';
      document.getElementById('pdfView').style.display = 'flex';
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('toolbar').style.display = 'flex';
      renderThumbnails();
      renderPage(1);
    });
  };
  reader.readAsArrayBuffer(file);
}

// ── Render thumbnails ──────────────────────────────────
function renderThumbnails() {
  var container = document.getElementById('pageThumbs');
  container.innerHTML = '';
  for (var i = 1; i <= totalPages; i++) {
    (function(pageNum) {
      pdfDoc.getPage(pageNum).then(function(page) {
        var vp = page.getViewport({scale: 0.3});
        var div = document.createElement('div');
        div.className = 'page-thumb' + (pageNum === 1 ? ' active' : '');
        div.onclick = function() {
          document.querySelectorAll('.page-thumb').forEach(function(t) { t.classList.remove('active'); });
          div.classList.add('active');
          renderPage(pageNum);
        };
        var c = document.createElement('canvas');
        c.width = vp.width; c.height = vp.height;
        var label = document.createElement('div');
        label.className = 'label';
        label.textContent = pageNum;
        div.appendChild(c);
        div.appendChild(label);
        container.appendChild(div);
        page.render({canvasContext: c.getContext('2d'), viewport: vp});
      });
    })(i);
  }
}

// ── Render full page ───────────────────────────────────
function renderPage(num) {
  currentPage = num;
  pdfDoc.getPage(num).then(function(page) {
    var vp = page.getViewport({scale: scale});
    var canvas = document.getElementById('pageCanvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    page.render({canvasContext: canvas.getContext('2d'), viewport: vp});
    // Reset signature position for new page
    if (sigPlaced) {
      var overlay = document.getElementById('sigOverlay');
      // Keep sig visible but constrain to new page
      constrainSig();
    }
  });
}

// ── Place signature ────────────────────────────────────
function placeSig() {
  if (!sigUrl) { alert('No signature found. Go to My Signature to create one.'); return; }
  var overlay = document.getElementById('sigOverlay');
  var canvas = document.getElementById('pageCanvas');
  // Default: bottom-right
  sigW = 150; sigH = 60;
  sigX = canvas.width - sigW - 40;
  sigY = canvas.height - sigH - 40;
  overlay.style.display = 'block';
  overlay.style.left = sigX + 'px';
  overlay.style.top = sigY + 'px';
  overlay.style.width = sigW + 'px';
  overlay.style.height = sigH + 'px';
  sigPlaced = true;
  document.getElementById('signBtn').disabled = false;
  updatePosInfo();
}

function removeSig() {
  document.getElementById('sigOverlay').style.display = 'none';
  sigPlaced = false;
  document.getElementById('signBtn').disabled = true;
  document.getElementById('posInfo').textContent = '';
}

function constrainSig() {
  var canvas = document.getElementById('pageCanvas');
  if (sigX < 0) sigX = 0;
  if (sigY < 0) sigY = 0;
  if (sigX + sigW > canvas.width) sigX = canvas.width - sigW;
  if (sigY + sigH > canvas.height) sigY = canvas.height - sigH;
  var overlay = document.getElementById('sigOverlay');
  overlay.style.left = sigX + 'px';
  overlay.style.top = sigY + 'px';
  overlay.style.width = sigW + 'px';
  overlay.style.height = sigH + 'px';
}

function updatePosInfo() {
  var canvas = document.getElementById('pageCanvas');
  var px = ((sigX / canvas.width) * 100).toFixed(1);
  var py = ((sigY / canvas.height) * 100).toFixed(1);
  document.getElementById('posInfo').textContent = 'Page ' + currentPage + ' | Position: ' + px + '%, ' + py + '%';
}

// ── Drag signature ─────────────────────────────────────
var overlay = document.getElementById('sigOverlay');
var resizeHandle = document.getElementById('resizeHandle');

overlay.addEventListener('mousedown', function(e) {
  if (e.target === resizeHandle) return;
  if (e.target.tagName === 'BUTTON') return;
  dragging = true;
  dragOffX = e.clientX - sigX;
  dragOffY = e.clientY - sigY;
  e.preventDefault();
});

resizeHandle.addEventListener('mousedown', function(e) {
  resizing = true;
  e.stopPropagation();
  e.preventDefault();
});

document.addEventListener('mousemove', function(e) {
  if (dragging) {
    sigX = e.clientX - dragOffX;
    sigY = e.clientY - dragOffY;
    constrainSig();
    updatePosInfo();
  }
  if (resizing) {
    var rect = document.getElementById('pageContainer').getBoundingClientRect();
    var newW = e.clientX - rect.left - sigX;
    var newH = e.clientY - rect.top - sigY;
    if (newW > 40) sigW = newW;
    if (newH > 20) sigH = newH;
    constrainSig();
    updatePosInfo();
  }
});

document.addEventListener('mouseup', function() { dragging = false; resizing = false; });

// Touch support for drag
overlay.addEventListener('touchstart', function(e) {
  if (e.target === resizeHandle || e.target.tagName === 'BUTTON') return;
  dragging = true;
  var t = e.touches[0];
  var rect = document.getElementById('pageContainer').getBoundingClientRect();
  dragOffX = t.clientX - rect.left - sigX;
  dragOffY = t.clientY - rect.top - sigY;
  e.preventDefault();
});

document.addEventListener('touchmove', function(e) {
  if (dragging) {
    var t = e.touches[0];
    var rect = document.getElementById('pageContainer').getBoundingClientRect();
    sigX = t.clientX - rect.left - dragOffX;
    sigY = t.clientY - rect.top - dragOffY;
    constrainSig();
    updatePosInfo();
  }
});

document.addEventListener('touchend', function() { dragging = false; resizing = false; });

// Click on page to place signature
document.getElementById('pageCanvas').addEventListener('click', function(e) {
  if (sigPlaced) return; // already placed, user should drag
  if (!sigUrl) return;
  var rect = this.getBoundingClientRect();
  sigX = (e.clientX - rect.left) * (this.width / rect.width) - sigW / 2;
  sigY = (e.clientY - rect.top) * (this.height / rect.height) - sigH / 2;
  placeSig();
});

// ── Sign and Download ──────────────────────────────────
function signAndDownload() {
  if (!pdfFile || !sigPlaced) return;
  var btn = document.getElementById('signBtn');
  btn.disabled = true;
  btn.textContent = 'Signing...';

  var canvas = document.getElementById('pageCanvas');
  // Convert pixel coords to percentage of page
  var xPct = sigX / canvas.width;
  var yPct = sigY / canvas.height;
  var wPct = sigW / canvas.width;
  var hPct = sigH / canvas.height;

  var fd = new FormData();
  fd.append('file', pdfFile);
  fd.append('page', currentPage);
  fd.append('x_pct', xPct);
  fd.append('y_pct', yPct);
  fd.append('w_pct', wPct);
  fd.append('h_pct', hPct);
  fd.append('add_date', document.getElementById('addDate').checked ? '1' : '0');

  fetch('/api/sign', {method: 'POST', body: fd})
  .then(function(r) {
    if (!r.ok) throw new Error('Signing failed');
    return r.blob();
  })
  .then(function(blob) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'signed_' + (pdfFileName || pdfFile.name);
    a.click();
    btn.disabled = false;
    btn.textContent = 'Sign & Download';
  })
  .catch(function(err) {
    alert('Error: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Sign & Download';
  });
}

function resetAll() {
  pdfDoc = null; pdfFile = null; sigPlaced = false;
  document.getElementById('uploadView').style.display = 'flex';
  document.getElementById('pdfView').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('sigOverlay').style.display = 'none';
  document.getElementById('pdfInput').value = '';
}
</script>
</body>
</html>
