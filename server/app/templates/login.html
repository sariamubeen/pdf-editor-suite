<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login - {{ APP_NAME }}</title>
<style>
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
.card { text-align: center; padding: 48px; background: white; border-radius: 16px;
        box-shadow: 0 2px 16px rgba(0,0,0,0.08); max-width: 380px; width: 100%; }
.card img { height: 56px; margin-bottom: 8px; }
h1 { margin: 0 0 4px; font-size: 24px; }
.sub { color: #888; font-size: 13px; margin: 0 0 28px; }
form { text-align: left; }
label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 4px; }
input[type=text], input[type=email] {
  width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px;
  font-size: 14px; outline: none; transition: border-color 0.15s; margin-bottom: 16px;
}
input:focus { border-color: #2563eb; }
button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none;
         border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
button:hover { background: #1d4ed8; }
.error { background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 8px;
         font-size: 13px; margin-bottom: 16px; }
.footer { margin-top: 32px; font-size: 11px; color: #ccc; }
.footer a { color: #999; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <img src="/logo.png" alt="{{ APP_NAME }}">
  <h1>{{ APP_NAME }}</h1>
  <p class="sub">Enter your name and email to continue</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login{% if next %}?next={{ next }}{% endif %}">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="John Doe" required autofocus>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="john@company.com" required>

    <button type="submit">Log in</button>
  </form>

  <div class="footer">
    Powered by <a href="https://github.com/sariamubeen/pdf-editor-suite">pdf-editor-suite</a>
  </div>
</div>
</body>
</html>
