# =============================================================================
# PDF Editor Suite - Docker Compose
# ONLYOFFICE Document Server + Web App
# by sariamubeen
# =============================================================================

services:

  # ONLYOFFICE Document Server - the PDF editor engine
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice
    restart: unless-stopped
    ports:
      - "0.0.0.0:${ONLYOFFICE_PORT:-8443}:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-pdfeditorsuite}
    volumes:
      - oo_data:/var/www/onlyoffice/Data
      - oo_lib:/var/lib/onlyoffice
      - oo_logs:/var/log/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Web App - handles uploads, serves files, renders editor page
  app:
    build: ./app
    container_name: pdf-editor-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:${APP_PORT:-8080}:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-pdfeditorsuite}
      - ONLYOFFICE_URL=http://${SERVER_IP:-localhost}:${ONLYOFFICE_PORT:-8443}
      - APP_URL=http://${SERVER_IP:-localhost}:${APP_PORT:-8080}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
      - signatures:/app/signatures
    depends_on:
      onlyoffice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  oo_data:
  oo_lib:
  oo_logs:
  uploads:
  signatures:
