# =============================================================================
# Stirling-PDF — Self-Hosted PDF Editor with Digital Signature Support
# =============================================================================
# Deployment: docker compose up -d
# Access:     http://localhost:8080 (proxied via Nginx Proxy Manager)
# Docs:       https://docs.stirlingpdf.com
# =============================================================================

services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped

    ports:
      - "${STIRLING_PORT:-8080}:8080"   # Configurable via .env — use with NPM or direct LAN access

    volumes:
      - stirling-data:/usr/share/tessdata          # OCR language packs
      - ./data/configs:/configs                     # Application config
      - ./data/logs:/logs                           # Log files
      - ./data/custom-files:/customFiles            # Custom branding / files
      - ./data/pipeline:/pipeline                   # Automation pipelines
      - ./data/certs:/certs                         # Signing certificates

    environment:
      # ── Authentication ─────────────────────────────────────────────────────
      - DOCKER_ENABLE_SECURITY=true
      - SECURITY_ENABLELOGIN=true
      - SECURITY_INITIALLOGIN_USERNAME=admin
      - SECURITY_INITIALLOGIN_PASSWORD=${STIRLING_ADMIN_PASSWORD:-ChangeMeOnFirstLogin!}

      # ── Locale ─────────────────────────────────────────────────────────────
      - SYSTEM_DEFAULTLOCALE=en_US

      # ── Auto-Generated Signing Certificate ─────────────────────────────────
      # Stirling-PDF will create a server certificate on first boot.
      # For production, replace with your own cert — see generate-cert.sh
      - SYSTEM_SERVERCERTIFICATE_ENABLED=true
      - SYSTEM_SERVERCERTIFICATE_ORGANIZATIONNAME=${CERT_ORG_NAME:-My Organization}
      - SYSTEM_SERVERCERTIFICATE_VALIDITY=365
      - SYSTEM_SERVERCERTIFICATE_REGENERATEONSTARTUP=false

      # ── Max File Size ──────────────────────────────────────────────────────
      - SYSTEM_MAXFILESIZE=100

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/info/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  stirling-data:
    driver: local
